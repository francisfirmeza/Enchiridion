<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Francis Firmeza" />
    <title>Enchiridion, simple exercise tracking.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="img/favicon.ico" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-brand">
        <h1 class="logo">ENCHIRIDION</h1>
        <p class="tagline">Simple exercise tracking.</p>
      </div>

      <!-- Tab Toggle -->
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <!-- Login Form -->
      <div class="auth-form" id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="login-btn">Sign In</button>
        <p class="auth-error" id="login-error"></p>
      </div>

      <!-- Register Form -->
      <div class="auth-form hidden" id="register-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="reg-password"
            placeholder="Min 6 characters"
          />
        </div>
        <button class="btn-primary" id="register-btn">Create Account</button>
        <p class="auth-error" id="reg-error"></p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
