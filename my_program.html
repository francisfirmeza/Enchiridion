<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="Francis Firmeza" />
    <title>My Program</title>
    <link rel="icon" href="img/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/style.css" type="text/css" />
  </head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="JS/app.js"></script>

  <body>
    <header>
      <h1>My Program</h1>

      <nav aria-label="primary-navigation">
        <ul>
          <li>
            <a href="/">Home</a>
          </li>
          <li>
            <a href="#programs">Programs</a>
          </li>
          <li>
            <a href="#traininghistory">Training History</a>
          </li>
          <li>
            <a href="#myprogram">My Program</a>
          </li>
        </ul>
      </nav>
    </header>

    <hr />
    <main>
      <form id="workout-form">
        <fieldset>
          <legend>Workout Input</legend>
          <p>
            <label for="weight">Weight:</label>
            <input
              type="number"
              name="weight" min="0" step="1" oninput="this.value = Math.abs(this.value)"
              id="weight"
            />
          </p>
          <button type="submit">SUBMIT</button>
        </fieldset>
      </form>
    </main>
  </body>
</html>
