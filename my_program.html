    <!DOCTYPE html>
<html lang="en">

    <header>

    <hr />
    <main>
      <form id="workout-form">
        <fieldset>
          <legend>Workout Input</legend>
          <p>
            <label for="weight">Weight:</label>
            <input
              type="number"
              name="weight" min="0" step="1" oninput="this.value = Math.abs(this.value)"
              id="weight"
            />
          </p>
          <p>
            <label for="sets">Sets:</label>
            <input
              type="number"
              name="sets" min="1" step="1" oninput="this.value = Math.abs(this.value)"
              id="sets"
            />
          </p>
          <p>
            <label for="reps">Reps:</label>
            <input
              type="number"
              name="reps" min="0" step="1" oninput="this.value = Math.abs(this.value)"
              id="reps"
            />
          </p>
          <button type="submit">SUBMIT</button>
        </fieldset>
      </form>
    </main>
  </body>
</html>
