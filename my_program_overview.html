<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="Francis Firmeza" />
    <title>My Program</title>
    <link rel="icon" href="img/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/style.css" type="text/css" />
  </head>

  <body>
    <header>
      <h1>My Program</h1>

      <nav aria-label="primary-navigation">
        <ul>
          <li>
            <a href="/">Home</a>
          </li>
          <li>
            <a href="#programs">Programs</a>
          </li>
          <li>
            <a href="#traininghistory">Training History</a>
          </li>
          <li>
            <a href="/my_program.html">My Program</a>
          </li>
        </ul>
      </nav>
    </header>

    <hr />
    <main>
      <form id="workout-log">
        <fieldset>
        <table>
          <thead>
            <tr>
              <th>Exercise</th>
              <th>Weight (lbs)</th>
              <th>Set</th>
              <th>Reps</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="workout-log-body">
            <!-- Workout log entries will be dynamically inserted here -->
            <tr>
              <td colspan="3">No workout entries found.</td>
            </tr>
          </tbody>
        </table>
        </fieldset>
      </form>
    </main>
    <hr />

    <button id="view-history">View Training History</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="JS/app.js"></script>
  </body>
</html>
